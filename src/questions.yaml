# QUIZ CONFIGURATION
config:
  STORAGE_KEY: "dinosaur_basics_v2"
  DECK_VERSION: 1
  QUIZ_EMOJI: "🦖"
  QUIZ_TITLE: "Dinosaur Basics"
  QUIZ_SUBJECT: "Paleontology"
  DESCRIPTION: |
    A sample exam covering the fundamentals of dinosaur biology, evolution, and the periods in which they lived, now with a full range of question types.

# --- Dinosaur Basics — Question Bank ---
questions:
  # --- TRUE / FALSE ---
    - { id: "tf1", topic: "Classification", type: "tf", question: "All dinosaurs were large, lumbering creatures.", answer: false, explanation: "False. Dinosaurs came in all shapes and sizes, from the chicken-sized Compsognathus to the giant Argentinosaurus." }
    - { id: "tf2", topic: "Biology", type: "tf", question: "Some dinosaurs had feathers.", answer: true, explanation: "True. Fossil evidence has proven that many theropod dinosaurs, including relatives of T. rex, had feathers." }
    - { id: "tf3", topic: "Time Periods", type: "tf", question: "Stegosaurus and Tyrannosaurus rex lived at the same time.", answer: false, explanation: "False. Stegosaurus lived in the late Jurassic Period, while T. rex lived at the end of the Cretaceous Period, about 80 million years later." }
    - { id: "tf4", topic: "Extinction", type: "tf", question: "All dinosaurs went extinct 66 million years ago.", answer: false, explanation: "False. The non-avian dinosaurs went extinct, but one lineage survived and evolved into modern birds." }
    - { id: "tf5", topic: "Biology", type: "tf", question: "All dinosaurs were carnivores.", answer: false, explanation: "False. Many dinosaurs, including the largest ones (sauropods), were herbivores. Others were omnivores." }
    - { id: "tf6", topic: "Classification", type: "tf", question: "Pterosaurs, the flying reptiles, were a type of dinosaur.", answer: false, explanation: "False. Pterosaurs were flying reptiles and close relatives, but they belong to a separate group and are not technically dinosaurs." }
    - { id: "tf7", topic: "Biology", type: "tf", question: "Scientists believe most dinosaurs were cold-blooded, like modern reptiles.", answer: false, explanation: "False. Most evidence now suggests that many dinosaurs were warm-blooded (endothermic), with metabolisms more like birds and mammals." }
    - { id: "tf8", topic: "Time Periods", type: "tf", question: "The Mesozoic Era is known as the 'Age of Dinosaurs'.", answer: true, explanation: "True. The Mesozoic Era is composed of the Triassic, Jurassic, and Cretaceous periods, during which dinosaurs were the dominant land animals." }
  
  # --- MULTIPLE CHOICE ---
    - { id: "mc1", topic: "Time Periods", type: "mc", question: "The three periods of the Mesozoic Era, in order from oldest to youngest, are:", options: ["Jurassic, Triassic, Cretaceous", "Triassic, Jurassic, Cretaceous", "Cretaceous, Jurassic, Triassic", "Triassic, Cretaceous, Jurassic"], answer: 1, explanation: "The Mesozoic Era began with the Triassic, followed by the Jurassic, and ended with the Cretaceous." }
    - { id: "mc2", topic: "Classification", type: "mc", question: "Tyrannosaurus rex belongs to which major group of dinosaurs?", options: ["Sauropods", "Ceratopsians", "Theropods", "Ankylosaurs"], answer: 2, explanation: "T. rex was a large, bipedal carnivore, which are the defining characteristics of the Theropod group." }
    - { id: "mc3", topic: "Extinction", type: "mc", question: "What is the leading scientific theory for the mass extinction event that killed the non-avian dinosaurs?", options: ["A massive volcanic eruption", "A catastrophic asteroid impact", "The onset of an Ice Age", "A worldwide disease"], answer: 1, explanation: "The Chicxulub impact crater and a worldwide layer of iridium provide strong evidence for a massive asteroid impact 66 million years ago." }
    - { id: "mc4", topic: "Biology", type: "mc", question: "The main difference between Saurischian ('lizard-hipped') and Ornithischian ('bird-hipped') dinosaurs is:", options: ["Their diet", "The structure of their hip bones", "Whether they had feathers", "The period in which they lived"], answer: 1, explanation: "This fundamental division in dinosaur classification is based on the orientation of the pubic bone in the hip." }
    - { id: "mc5", topic: "Classification", type: "mc", question: "Triceratops is a famous member of which dinosaur group, known for their horns and frills?", options: ["Stegosaurs", "Pachycephalosaurs", "Hadrosaurs", "Ceratopsians"], answer: 3, explanation: "Ceratopsians, meaning 'horned faces', are characterized by the elaborate horns and bony frills on their skulls." }
    - { id: "mc6", topic: "Biology", type: "mc", question: "The long-necked, plant-eating dinosaurs like Brachiosaurus and Diplodocus are known as:", options: ["Theropods", "Sauropods", "Ornithopods", "Ankylosaurs"], answer: 1, explanation: "Sauropods were a group of Saurischian dinosaurs known for their immense size, long necks and tails, and herbivorous diet." }
    - { id: "mc7", topic: "Evolution", type: "mc", question: "Modern birds are direct descendants of which group of dinosaurs?", options: ["Ankylosaurs", "Sauropods", "Ceratopsians", "Theropods"], answer: 3, explanation: "An overwhelming amount of fossil evidence, including skeletal structure and feathers, confirms that birds evolved from small, feathered theropod dinosaurs." }
    - { id: "mc8", topic: "Biology", type: "mc", question: "What was the likely purpose of the large plates on the back of a Stegosaurus?", options: ["Body armor for defense", "To help it fly", "For display and to help regulate body temperature", "To store food"], answer: 2, explanation: "Scientists believe the plates, which were filled with blood vessels, were used primarily for display and for absorbing or releasing heat." }
    - { id: "mc9", topic: "Classification", type: "mc", question: "Ankylosaurus was known for what primary defensive feature?", options: ["A large horn on its nose", "A thick, armored back and a club on its tail", "The ability to run at high speeds", "Sharp claws on its hands"], answer: 1, explanation: "Ankylosaurs were the 'armored tanks' of the dinosaur world, protected by bony plates and a powerful tail club." }
    - { id: "mc10", topic: "Biology", type: "mc", question: "A coprolite is the fossilized form of what?", options: ["A dinosaur egg", "Dinosaur dung", "A dinosaur tooth", "A dinosaur footprint"], answer: 1, explanation: "Coprolites, or fossilized feces, are trace fossils that can give scientists valuable clues about a dinosaur's diet." }

  # --- FILL IN THE BLANK ---
    - { id: "fitb1", topic: "Time Periods", type: "fitb", question: "The study of fossils to understand ancient life is called ___.", accepted: ["paleontology"], explanation: "Paleontology combines geology and biology to reconstruct the history of life on Earth." }
    - { id: "fitb2", topic: "Evolution", type: "fitb", question: "Modern birds are the only surviving lineage of ___ dinosaurs.", accepted: ["avian"], explanation: "The term 'avian' refers to birds, distinguishing them from the extinct 'non-avian' dinosaurs." }
    - { id: "fitb3", topic: "Classification", type: "fitb", question: "Dinosaurs are divided into two main groups based on the structure of their ___.", accepted: ["hips"], explanation: "The 'lizard-hipped' Saurischians and 'bird-hipped' Ornithischians form the two primary branches of the dinosaur family tree." }
    - { id: "fitb4", topic: "Time Periods", type: "fitb", question: "The ___ Period came after the Jurassic and was the final period of the Age of Dinosaurs.", accepted: ["Cretaceous"], explanation: "The Cretaceous Period ended 66 million years ago with the K-Pg mass extinction event." }
    - { id: "fitb5", topic: "Classification", type: "fitb", question: "The group of bipedal, carnivorous dinosaurs like Velociraptor and T. rex are known as ___.", accepted: ["theropods"], explanation: "Theropods were the dominant predators for most of the Mesozoic Era." }
    - { id: "fitb6", topic: "Biology", type: "fitb", question: "An animal that eats only plants is called a(n) ___.", accepted: ["herbivore"], explanation: "Many famous dinosaurs, like Triceratops and the giant sauropods, were herbivores." }
    - { id: "fitb7", topic: "Extinction", type: "fitb", question: "The worldwide layer of clay rich in the element ___, which is rare on Earth but common in asteroids, is key evidence for an impact event.", accepted: ["iridium"], explanation: "The discovery of the iridium layer in the 1980s was a major breakthrough in the extinction theory." }
    - { id: "fitb8", topic: "Biology", type: "fitb", question: "A fossilized footprint is a type of 'trace fossil' also known as a(n) ___.", accepted: ["ichnofossil"], explanation: "Trace fossils (ichnofossils) record the behavior of an animal, rather than its body parts." }

  # --- DEFINITION ---
    - { id: "def1", topic: "Classification", type: "def", question: "The group of dinosaurs known as the 'armored dinosaurs', which were covered in bony plates.", answer: "Ankylosauria", options: ["Ankylosauria", "Ceratopsia", "Sauropoda", "Theropoda"], explanation: "Ankylosauria is the group containing dinosaurs like Ankylosaurus and Nodosaurus." }
    - { id: "def2", topic: "Time Periods", type: "def", question: "The supercontinent that existed during the early Mesozoic Era, from which all modern continents are derived.", answer: "Pangaea", options: ["Pangaea", "Gondwana", "Laurasia", "Rodinia"], explanation: "The breakup of Pangaea throughout the Mesozoic Era led to the dinosaurs evolving in isolation on different landmasses." }
    - { id: "def3", topic: "Biology", type: "def", question: "Stones swallowed by an animal to aid in the digestion of food.", answer: "Gastroliths", options: ["Gastroliths", "Coprolites", "Osteoderms", "Fenestrae"], explanation: "Gastroliths have been found with the fossils of many herbivorous dinosaurs, suggesting they used them to grind tough plant material." }
    - { id: "def4", topic: "Biology", type: "def", question: "The scientific term for an animal that is active primarily at dawn and dusk.", answer: "Crepuscular", options: ["Crepuscular", "Nocturnal", "Diurnal", "Matutinal"], explanation: "Some studies on the scleral rings (eye bones) of dinosaurs suggest that species like Velociraptor may have been crepuscular." }
  
  # --- ORDERING ---
    - { id: "order1", topic: "Time Periods", type: "ordering", question: "Arrange these geologic time periods from oldest to most recent.", correctOrder: ["Triassic", "Jurassic", "Cretaceous", "Paleogene"], explanation: "The three periods of the Mesozoic Era were the Triassic, Jurassic, and Cretaceous. The Paleogene period began after the extinction event." }
    - { id: "order2", topic: "Evolution", type: "ordering", question: "Arrange these dinosaurs in the order they first appeared in the fossil record.", correctOrder: ["Eoraptor", "Allosaurus", "Triceratops", "Tyrannosaurus Rex"], explanation: "Eoraptor is one of the earliest known dinosaurs (Triassic). Allosaurus was a top predator of the Jurassic. Triceratops and T. rex were contemporaries at the very end of the Cretaceous." }
    - { id: "order3", topic: "Biology", type: "ordering", question: "Arrange these dinosaurs by their typical adult size, from smallest to largest.", correctOrder: ["Compsognathus", "Velociraptor", "Stegosaurus", "Argentinosaurus"], explanation: "Compsognathus was chicken-sized. Velociraptor was turkey-sized. Stegosaurus was about the size of a bus. Argentinosaurus was one of the largest animals of all time." }

  # --- MATCHING ---
    - { id: "match1", topic: "Classification", type: "match", question: "Match the dinosaur to its defining characteristic.", pairs: [ {term: "Triceratops", desc: "Three horns on its face"}, {term: "Spinosaurus", desc: "A large 'sail' on its back"}, {term: "Parasaurolophus", desc: "A long, hollow crest on its head"}, {term: "Ankylosaurus", desc: "A club on the end of its tail"} ], explanation: "These distinctive features are key to identifying these famous dinosaurs." }
    - { id: "match2", topic: "Time Periods", type: "match", question: "Match the dinosaur to the period in which it lived.", pairs: [ {term: "Coelophysis", desc: "Triassic Period"}, {term: "Stegosaurus", desc: "Jurassic Period"}, {term: "Iguanodon", desc: "Cretaceous Period"}, {term: "Plateosaurus", desc: "Triassic Period"} ], explanation: "Knowing which dinosaurs lived when is key to understanding their evolution and the ecosystems they inhabited." }
    - { id: "match3", topic: "Classification", type: "match", question: "Match the dinosaur group to its description.", pairs: [ {term: "Sauropods", desc: "Giant, long-necked herbivores"}, {term: "Theropods", desc: "Bipedal carnivores"}, {term: "Ceratopsians", desc: "Herbivores with horns and frills"}, {term: "Ornithopods", desc: "Duck-billed dinosaurs"} ], explanation: "These major groups help paleontologists classify the vast diversity of the dinosaur kingdom." }

  # --- ADDITIONAL QUESTIONS ---
    - { id: "def5", topic: "Biology", type: "def", question: "Bony plates embedded in the skin of dinosaurs like Ankylosaurus, which served as armor.", answer: "Osteoderms", options: ["Osteoderms", "Fenestrae", "Gastralia", "Scutes"], explanation: "Osteoderms, meaning 'bone skin', are bony deposits forming scales or plates in the dermal layers of the skin." }
    - { id: "mc16", topic: "Biology", type: "mc", question: "What is the primary function of the hollow, air-filled bones (skeletal pneumaticity) found in theropods?", options: ["To store water for long journeys", "To make them heavier for fighting", "To lighten the skeleton for greater agility", "To create sound for communication"], answer: 2, explanation: "This feature, shared with modern birds, was a key adaptation that reduced weight, allowing for a more active and agile lifestyle." }
    - { id: "fitb9", topic: "Classification", type: "fitb", question: "The two main branches of Dinosauria, Saurischia and Ornithischia, mean 'lizard-hipped' and '___-hipped' respectively.", accepted: ["bird"], explanation: "This name refers to the pelvic structure, although ironically, birds evolved from the 'lizard-hipped' (Saurischian) line of dinosaurs." }
    - { id: "match4", topic: "Classification", type: "match", question: "Match the dinosaur's name to its approximate Greek or Latin meaning.", pairs: [ {term: "Tyrannosaurus", desc: "Tyrant Lizard"}, {term: "Velociraptor", desc: "Swift Seizer"}, {term: "Stegosaurus", desc: "Roofed Lizard"}, {term: "Corythosaurus", desc: "Helmet Lizard"} ], explanation: "The scientific names of dinosaurs are often descriptive of their most notable features or presumed behavior." }